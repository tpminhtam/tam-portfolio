<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Technology | Tam Tran</title>
    <link rel="stylesheet" href="../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .update-notice {
            min-height: calc(100vh - 200px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4rem 2rem;
        }
        .update-card {
            text-align: center;
            max-width: 520px;
            padding: 3.5rem 3rem;
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(100, 116, 139, 0.2);
            border-radius: 20px;
            position: relative;
            overflow: hidden;
        }
        .update-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: var(--gradient-1);
        }
        .update-icon {
            width: 80px; height: 80px;
            border-radius: 50%;
            background: rgba(99, 102, 241, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
            animation: pulse-glow 3s ease-in-out infinite;
        }
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.2); }
            50% { box-shadow: 0 0 30px 10px rgba(99, 102, 241, 0.15); }
        }
        .update-card h2 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.6rem;
            color: var(--white);
            margin-bottom: 1rem;
        }
        .update-card p {
            color: var(--gray-light);
            font-size: 1rem;
            line-height: 1.7;
            margin-bottom: 0;
        }
        .update-dots {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 2rem;
        }
        .update-dots span {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--primary-light);
            opacity: 0.4;
            animation: dot-blink 1.5s ease-in-out infinite;
        }
        .update-dots span:nth-child(2) { animation-delay: 0.3s; }
        .update-dots span:nth-child(3) { animation-delay: 0.6s; }
        @keyframes dot-blink {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <nav class="navbar scrolled">
        <div class="nav-container">
                        <ul class="nav-links">
                <li><a href="../index.html">Home</a></li>
                <li><a href="agentic-ai.html">Agentic AI</a></li>
                <li><a href="tax-tech.html">Tax Technology</a></li>
                <li><a href="finance-tech.html" class="active">Finance Technology</a></li>
                <li><a href="my-apps.html">Products</a></li>
            </ul>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <header class="page-header">
        <div class="particles" id="particles"></div>
        <div class="container" style="text-align: center;">
            <h1 class="animate-slide-up">Finance Technology</h1>
        </div>
    </header>

    <section class="update-notice">
        <div class="update-card animate-slide-up delay-1">
            <div class="update-icon">
                <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="var(--primary-light)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2v4"/><path d="M12 18v4"/><path d="M4.93 4.93l2.83 2.83"/><path d="M16.24 16.24l2.83 2.83"/><path d="M2 12h4"/><path d="M18 12h4"/><path d="M4.93 19.07l2.83-2.83"/><path d="M16.24 7.76l2.83-2.83"/>
                </svg>
            </div>
            <h2>Content Coming Soon</h2>
            <p>This page is currently being updated with new content. Please check back soon.</p>
            <div class="update-dots">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-contact">
                    <div class="footer-contact-icon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                    </div>
                    <a href="mailto:tpminhtam@gmail.com">tpminhtam@gmail.com</a>
                </div>
            </div>
        </div>
    </footer>

    <script>
        const hamburger = document.querySelector('.hamburger');
        const navLinks = document.querySelector('.nav-links');

        hamburger.addEventListener('click', () => {
            navLinks.classList.toggle('active');
            hamburger.classList.toggle('active');
        });

        function createParticles() {
            const container = document.getElementById('particles');
            if (!container) return;
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 5 + 's';
                particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
                container.appendChild(particle);
            }
        }
        createParticles();
    </script>
</body>
</html>
